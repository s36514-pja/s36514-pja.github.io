  <head>
    <meta charset="UTF-8">

  <body id="game-page">
    <canvas id="bg-canvas"></canvas>
    <main id="minigame-content">
      <header id="portfolio-header" class="header"></header>
      <section id="game-area">
          <div id="landing-backdrop"></div>

          <div id="riddle-container">
            <div id="riddle-text"></div>
            <p id="riddle-source"></p>

            <form id="zagadka-field">
              <input 
                type="text" 
                id="psswd" 
                name="password" 
                required 
                autocomplete="off" 
                class="riddle-TextField"
              />
              <div id="key-lock" style="opacity: 0">
                <button id="button" type="submit">
                    <!--TUTAJ BĘDZIE GRAFIKA WEKTOROWA W HTML-->
                  <!--p>placeholder_to_be_shook</p-->
                </button>
              </div>
            </form>
          </div>
          <div id="vislock">
            <div id="score-display">
              <span id="score-label">Score</span>
              <span id="score-value">0</span>
            </div>
            <div id="lock-mechanism"></div>
            <h1 id="riddle-feedback"></h1>
          </div>
      </section>
    </main>
  </body>
</html>
