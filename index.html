<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="artist portfolio">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <script type="module" src="/src/main.js"></script>
    
    <link rel="stylesheet" href="https://use.typekit.net/ubn0chn.css">
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <link rel="stylesheet" type="text/css" href="/src/styles/style.css"/>
    <link rel="stylesheet" type="text/css" href="/src/styles/animations.css">
    <link rel="stylesheet" type="text/css" href="/src/styles/portfolio.css">
    <title>Home</title>
  </head>

  <body>
    
    <!--LANDING PAGE-->
    <div id="landing">

      <canvas id="bg-canvas"></canvas>

      <div id="landing-backdrop"></div>

      <div id="riddle-container">
        <div id="riddle-text"></div>
        <p id="riddle-source"></p>

        <form id="zagadka-field">
          <input 
            type="text" 
            id="psswd" 
            name="password" 
            required 
            autocomplete="off" 
            class="riddle-TextField"
          />
          <input 
            type="submit" 
            value="✓" 
            class="riddle-Button"
          />
        </form>
      </div>
      <div id="vislock">
        <div id="key-lock">
            <!--TUTAJ BĘDZIE GRAFIKA WEKTOROWA W HTML-->
          <svg id="lock-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
            <path id="lock-shackle"
              d="
              M 30 50 
              l 0 -15 
              Q 30 15 50 15 
              Q 70 15 70 35 
              l 0 15"
              fill="none"
              stroke="currentColor"
              stroke-width="6"
              stroke-linecap="round"
            />
            <rect id="lock-body"
              x="25" y="50" width="50" height="45" rx="4"
              fill="none"
              stroke="currentColor"
              stroke-width="6"
            />
            <path id="lock-keyhole"
              d=" 
                M 50 70
                m -3 0
                Q 40 60 50 60
                q 10 0 3 10
                l 2 10
                h -10
                Z
              "
              fill="none"
              stroke="currentColor"
              stroke-width="4"
            />
          </svg>
          <!--p>placeholder_to_be_shook</p-->
      </div>
        <div id="lock-mechanism"></div>
        <h1 id="riddle-feedback"></h1>
      </div>

    </div>    
    
    <!--CONTENT-->
    <main id="content">
      <header id="portfolio-header">
        <p>LOGO</p>
        <p>PRACE</p>
        <p>GIERKA</p>
        <p>O mnie</p>
      </header>

      <section id="gallery">
        <div id="digital-artwork-rgb">
          <div id="showcase">
            
          </div>
        </div>
        <div id="physical-artwork-cmyk">
          <div id="showcase2">
            
          </div>
        </div>
      </section>

      <footer id="portfolio-footer">
        
      </footer>

    </main>
  </body>
</html>
